name: Deploy AI Service to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'apps/ai-service/**'

jobs:
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      # Authenticate to Google Cloud via Workload Identity Federation (no key file needed)
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev

      - name: Build and push Docker image
        run: |
          IMAGE="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/neuroclass/ai-service:${{ github.sha }}"
          docker build -t "$IMAGE" apps/ai-service/
          docker push "$IMAGE"

      - name: Deploy to Cloud Run
        run: |
          IMAGE="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/neuroclass/ai-service:${{ github.sha }}"
          gcloud run deploy neuroclass-ai \
            --image="$IMAGE" \
            --region=${{ secrets.GCP_REGION }} \
            --memory=2Gi \
            --cpu=2 \
            --min-instances=0 \
            --max-instances=10 \
            --no-allow-unauthenticated \
            --project=${{ secrets.GCP_PROJECT_ID }}

# NOTE: For Phase 0, this workflow is a scaffold.
# The AI service Cloud Run deployment is optional in Phase 0.
# Focus on Vercel + Supabase first.
# Required secrets: GCP_PROJECT_ID, GCP_REGION, GCP_SERVICE_ACCOUNT, GCP_WORKLOAD_IDENTITY_PROVIDER
