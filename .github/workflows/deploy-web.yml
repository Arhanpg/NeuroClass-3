# Deploy Web to Vercel
# Vercel GitHub integration auto-deploys on push to main.
# This workflow is manual-only to avoid double-deploys and missing secret conflicts.
# Re-enable on: push in Phase 4 when pre-deploy DB migrations are needed.

name: Deploy Web to Vercel

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and deploy
        working-directory: apps/web
        run: |
          npm install
          npx vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
