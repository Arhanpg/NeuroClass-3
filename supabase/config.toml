# Supabase CLI project configuration
# Docs: https://supabase.com/docs/guides/cli/config

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true

[storage]
enabled = true
file_size_limit = "524288000" # 500 MB

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://neuroclass.vercel.app"]
jwt_expiry = 86400
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false # Set to true in production

# Google OAuth — disabled for Phase 0 local dev.
# To enable: set enabled=true and fill client_id + secret from
# Google Cloud Console > APIs & Services > Credentials > OAuth 2.0 Client IDs
# Then also add them in Supabase Dashboard > Authentication > Providers > Google
[auth.external.google]
enabled = false
client_id = ""
secret = ""
skip_nonce_check = false

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[edge_runtime]
enabled = true

[analytics]
enabled = false
